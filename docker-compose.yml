version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: aifinance_postgres
    environment:
      POSTGRES_DB: aifinance
      POSTGRES_USER: aifinance_user
      POSTGRES_PASSWORD: aifinance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aifinance_redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:6
    container_name: aifinance_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: